name: kit checks

on: [push, pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Hard gate — the manifest must be a complete inventory of the kit.
      - name: MANIFEST.json is a complete inventory
        run: bash bin/check-manifest

      # Advisory — surfaces platform drift in universal kit files. Not a
      # hard gate yet: the kit has pre-existing findings to clear first
      # (run /lint-kit fix). Drop continue-on-error once lint is clean.
      - name: Platform-drift lint (advisory)
        run: bash bin/lint
        continue-on-error: true
